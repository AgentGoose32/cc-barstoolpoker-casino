<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kong - PL Casino</title>
<style>
*{ box-sizing:border-box; margin:0; padding:0; }
:root{
    --accent:#ffd700;
    --safe-color:#4aff7a;
    --trap-color:#ff4a4a;

    /* Debug layout controls â€” 3-col (easy/hard) */
    --img-size: 122%;
    --cell-gap: -35px;
    --row-gap: -21px;
    --grid-pad-left: 127px;
    --grid-pad-right: 138px;
    --grid-pad-top: 171px;
    --grid-pad-bottom: 130px;
    --row-label-w: 16px;
    --row-multi-w: 37px;

    --cell-img-offset-x: 3px;
    --cell-img-offset-y: 1px;
    --controls-offset-y: 123px;
    --controls-offset-x: 0px;

    /* Controls area offset */
    --controls-offset-x: -3px;
    --controls-offset-y: 131px;

    /* Chips positioning */
    --chips-scale: 1.4;
    --chips-x: 12px;
    --chips-y: 3px;

    /* Multiplier positioning */
    --mult-scale: 1.45;
    --mult-x: 4px;
    --mult-y: -654px;

    /* Bet display */
    --bet-scale: 1.15;
    --bet-x: 9px;
    --bet-y: 6px;

    /* Action buttons */
    --action-x: 9px;
    --action-y: 0px;

    /* Balance */
    --bal-x: 12px;
    --bal-y: -3px;

    /* Cash-out display */
    --cashout-scale: 1;
    --cashout-x: 0px;
    --cashout-y: 0px;

    /* Chip+Bet row */
    --cbrow-scale: 1.15;
    --cbrow-x: 4px;
    --cbrow-y: 342px;
    --cbrow-gap: 4px;
    --cbrow-chip-size: 41px;
    --cbrow-bet-font: 17px;

    /* Cash-out button */
    --cobtn-scale: 1;
    --cobtn-x: 0px;
    --cobtn-y: 0px;
    --cobtn-font: 14px;

    /* Result line */
    --result-scale: 0.95;
    --result-x: 0px;
    --result-y: 264px;
    --result-font: 14px;

    /* Result buttons row */
    --pa-scale: 1.1;
    --pa-x: 4px;
    --pa-y: 339px;
    --pa-font: 12px;
    --pa-gap: 30px;

    /* Choose Your Seal */
    --choose-scale: 0.9;
    --choose-x: -2px;
    --choose-y: 340px;

    /* Row highlight */
    --row-hl-width: 5px;
    --row-hl-blur: 14px;
    --row-hl-opacity: 0.8;
    --row-hl-expand-x: -22px;
    --row-hl-expand-y: 4px;
    --row-hl-x: 3px;
    --row-hl-y: -3px;

    /* Mode button individual positioning */
    --mode-btn-w: 91px;
    --mode-easy-x: -120px;
    --mode-easy-y: 168px;
    --mode-medium-x: 2px;
    --mode-medium-y: 173px;
    --mode-hard-x: 125px;
    --mode-hard-y: 170px;
}

html, body {
    width:100%; height:100%;
    overflow:hidden;
    font-family:Georgia,serif;
    color:#fff;
}

/* Full height, bars on sides only â€” mirrors Blackjack pattern */
body { background:#000; color:#fff; font-family:Georgia,serif; overflow:hidden; width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }

/* No extra centering wrapper needed */
.page-center {
    position:relative;
    z-index:1;
    display:contents;
}

/* Game card: height=100vh, width=aspect-ratio of the image (1024/1400) */
.game-wrap {
    position:relative;
    height: 100vh;
    width: calc(100vh * 1024 / 1400);
    display:flex;
    flex-direction:column;
    padding: var(--grid-pad-top) var(--grid-pad-right) var(--grid-pad-bottom) var(--grid-pad-left);
    gap: 5px;
    background: url('https://drive.google.com/thumbnail?id=10AEBQZVNL8zFweGXRV9Jm0coydus5FSv&sz=w1400')
                center center / 100% 100% no-repeat #000;
}

/* ---- Choose Your Seal ---- */
#chooseDisp {
    position:absolute;
    display:none;
    top:50%; left:50%;
    transform: translate(calc(-50% + var(--choose-x)), calc(-50% + var(--choose-y))) scale(var(--choose-scale));
    transform-origin:center;
    text-align:center;
    z-index:15;
    pointer-events:none;
    white-space:nowrap;
    font-size:20px;
    font-weight:bold;
    color:var(--accent);
    letter-spacing:3px;
    text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 2px 4px rgba(0,0,0,0.9);
}

/* ---- Row highlight ---- */
.grid-row { position:relative; }
.grid-row.state-active::before {
    content:'';
    position:absolute;
    top:    calc(0px - var(--row-hl-expand-y) + var(--row-hl-y));
    bottom: calc(0px - var(--row-hl-expand-y) - var(--row-hl-y));
    left:   calc(0px - var(--row-hl-expand-x) + var(--row-hl-x));
    right:  calc(0px - var(--row-hl-expand-x) - var(--row-hl-x));
    border: var(--row-hl-width) solid rgba(255,215,0, var(--row-hl-opacity));
    border-radius:6px;
    box-shadow: 0 0 var(--row-hl-blur) rgba(255,215,0, var(--row-hl-opacity)),
                inset 0 0 var(--row-hl-blur) rgba(255,215,0, calc(var(--row-hl-opacity) * 0.3));
    pointer-events:none;
    z-index:5;
    animation: rowGlowPulse 1.4s ease-in-out infinite;
}
@keyframes rowGlowPulse {
    0%,100% { opacity: var(--row-hl-opacity); }
    50%     { opacity: 1; box-shadow: 0 0 calc(var(--row-hl-blur) * 2) rgba(255,215,0,1), inset 0 0 var(--row-hl-blur) rgba(255,215,0,0.5); }
}

/* ---- Cash-out display â€” removed ---- */
#cashoutDisp { display:none !important; }

/* ---- Mode image buttons â€” individually positioned ---- */
.mode-img-btn {
    position: absolute;
    width: var(--mode-btn-w);
    height: auto;
    cursor: pointer;
    border-radius: 4px;
    border: 2px solid transparent;
    transition: all 0.15s;
    display: block;
    opacity: 0.7;
    z-index: 20;
    /* center horizontally as baseline, then offset per-button */
    left: 50%;
    transform: translateX(-50%);
}
.mode-img-btn.active {
    border-color: var(--accent);
    opacity: 1;
    box-shadow: 0 0 12px rgba(255,215,0,0.5);
}
.mode-img-btn:hover { opacity: 0.9; }
#mib-easy   { bottom: var(--mode-easy-y);   transform: translateX(calc(-50% + var(--mode-easy-x))); }
#mib-medium { bottom: var(--mode-medium-y); transform: translateX(calc(-50% + var(--mode-medium-x))); }
#mib-hard   { bottom: var(--mode-hard-y);   transform: translateX(calc(-50% + var(--mode-hard-x))); }

/* ---- Grid container ---- */
.grid-wrap {
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    gap: var(--row-gap);
    overflow:visible;
    min-height:0;
}

/* Header bar inside the grid frame â€” invisible but keeps layout space */
.grid-header { visibility:hidden; flex-shrink:0; min-height:22px; }
.grid-header-val {
    font-size:15px;
    font-weight:bold;
    color:var(--accent);
    text-shadow: 0 0 12px rgba(255,215,0,0.7), 0 1px 3px rgba(0,0,0,0.9);
    letter-spacing:1px;
}
.grid-header-label {
    font-size:9px;
    color:#9a7a30;
    letter-spacing:2px;
    margin-left:6px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
}

/* ---- Row ---- */
.grid-row {
    display:flex;
    align-items:center;
    gap:6px;
    flex:1;
    min-height:0;
    overflow:visible;
    transition:opacity 0.2s;
}
.grid-row.state-future { opacity:0.75; }
.grid-row.state-cleared { opacity:0.85; }
.grid-row.state-active { opacity:1; }
.grid-row.state-dead { opacity:0.5; }
.grid-row.state-dead .cell.trap-revealed {
    opacity:1 !important;
    background: rgba(160,20,20,0.92) !important;
    border-color:#ff4444 !important;
    color:#ff4a4a !important;
    box-shadow: 0 0 16px rgba(255,60,60,0.7) !important;
    animation: trapFlash 0.5s ease 0.1s both;
}
@keyframes trapFlash {
    0%   { transform:scale(0.7); opacity:0; }
    60%  { transform:scale(1.12); }
    100% { transform:scale(1);   opacity:1; }
}

.row-label {
    width: var(--row-label-w); font-size:10px;
    color:rgba(255,215,0,0.45); text-align:center; flex-shrink:0;
    text-shadow:0 1px 3px rgba(0,0,0,0.9);
    display: none;
}
.grid-row.state-active .row-label { color:var(--accent); font-weight:bold; }

.cells {
    flex:1; display:flex; gap: var(--cell-gap); justify-content:center; height:100%; overflow:visible;
}

.cell {
    flex:1;
    height:100%;
    border-radius:4px;
    border:none;
    background: transparent;
    cursor:not-allowed;
    display:flex; align-items:center; justify-content:center;
    transition:transform 0.12s;
    position:relative; overflow:visible; user-select:none;
}
.grid-row.state-active .cell {
    cursor:pointer;
}
.grid-row.state-active .cell:hover {
    transform:scale(1.08);
    filter: brightness(1.2) drop-shadow(0 0 6px rgba(255,215,0,0.6));
}
.cell.safe { background:transparent; border:none; }
.cell.chosen-safe {
    background:transparent; border:none;
    filter: drop-shadow(0 0 8px rgba(80,255,80,0.7));
}
.cell.trap { background:transparent; border:none; }
.cell.chosen-trap {
    background:transparent; border:none;
    filter: drop-shadow(0 0 8px rgba(255,60,60,0.7));
    animation:shake 0.35s ease;
}
@keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-5px)}
    40%{transform:translateX(5px)}
    60%{transform:translateX(-3px)}
    80%{transform:translateX(3px)}
}

.row-multi {
    width: var(--row-multi-w); text-align:right; font-size:10px;
    color:rgba(180,140,40,0.7); flex-shrink:0; font-weight:bold;
    text-shadow:0 1px 3px rgba(0,0,0,0.9);
    display: none;
}
.grid-row.state-active .row-multi {
    color:var(--accent); font-size:11px;
}

#controlsArea {
    flex-shrink:0;
    display:flex; flex-direction:column; gap:5px;
    transform: translate(var(--controls-offset-x), var(--controls-offset-y));
}

/* ---- Multiplier banner ---- */
.mult-banner {
    text-align:center; padding:0; flex-shrink:0;
    transform: translate(var(--mult-x), var(--mult-y)) scale(var(--mult-scale));
    transform-origin: center;
}
.mult-val {
    font-size:22px; color:var(--accent); font-weight:bold;
    text-shadow: 0 0 24px rgba(255,215,0,0.6), 0 2px 4px rgba(0,0,0,0.9);
    line-height:1;
}
.mult-label { display:none; }

/* ---- Chip+Bet combined row â€” absolutely positioned ---- */
#chipBetRow {
    position:absolute;
    left:50%; top:50%;
    transform: translate(calc(-50% + var(--cbrow-x)), calc(-50% + var(--cbrow-y))) scale(var(--cbrow-scale));
    transform-origin:center;
    display:flex;
    flex-direction:row;
    align-items:center;
    justify-content:center;
    gap:var(--cbrow-gap);
    z-index:10;
}

/* ---- Chips ---- */
.chip-row {
    display:flex; gap:4px; justify-content:center; align-items:center;
    flex-shrink:0;
}
.chip-btn {
    width:var(--cbrow-chip-size); height:var(--cbrow-chip-size); border-radius:50%;
    border:2px solid rgba(80,60,0,0.6);
    cursor:pointer; padding:3px; background:transparent;
    transition:all 0.12s;
}
.chip-btn img { width:100%; height:100%; border-radius:50%; display:block; }
.chip-btn.selected {
    border-color:#ffd700;
    box-shadow: 0 0 12px rgba(255,215,0,0.55);
}

/* ---- Bet row ---- */
.bet-row {
    display:flex; align-items:center; gap:6px; justify-content:center;
    flex-shrink:0;
}
.bet-disp {
    background: rgba(0,0,0,0.65);
    border:1px solid rgba(150,110,0,0.5);
    border-radius:6px; padding:4px 14px;
    font-size:var(--cbrow-bet-font); color:var(--accent);
    min-width:80px; text-align:center;
    text-shadow:0 1px 3px rgba(0,0,0,0.8);
    font-weight:bold;
}
.sml-btn {
    background: rgba(0,0,0,0.55);
    border:1px solid rgba(100,80,20,0.5);
    color:#a08030; padding:3px 8px; border-radius:4px;
    cursor:pointer; font-size:11px; transition:all 0.12s;
    text-shadow:0 1px 2px rgba(0,0,0,0.8);
}
.sml-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ---- Action buttons ---- */
.action-row { display:flex; gap:6px; flex-shrink:0; transform: translate(var(--action-x), var(--action-y)); min-height:36px; }
.btn {
    flex:1; padding:7px 6px; border-radius:6px;
    border:1px solid #555; cursor:pointer;
    font-family:Georgia,serif; font-size:13px;
    font-weight:bold; letter-spacing:1px; transition:all 0.15s;
    text-shadow:0 1px 3px rgba(0,0,0,0.8);
}
.btn-play {
    background: linear-gradient(180deg,rgba(30,74,14,0.85),rgba(16,40,8,0.85));
    border-color:#3a7a1a; color:#88ff88;
}
.btn-play:hover { border-color:var(--accent); color:var(--accent); }
.btn-cashout {
    background: linear-gradient(180deg,rgba(74,58,8,0.9),rgba(42,32,8,0.9));
    border-color:#8a6a1a; color:var(--accent); font-size:var(--cobtn-font);
    transform: translate(var(--cobtn-x), var(--cobtn-y)) scale(var(--cobtn-scale));
    transform-origin: center;
}
.btn-cashout:hover { border-color:#fff; box-shadow:0 0 14px rgba(255,215,0,0.45); }
.btn-clear {
    background: rgba(10,10,10,0.65);
    border-color:#444; color:#777;
}
.btn-rebet {
    background: rgba(26,16,8,0.75);
    border-color:#6a4a18; color:#c9a84c; font-size:12px;
}
.btn-new {
    background: linear-gradient(180deg,rgba(26,42,26,0.8),rgba(13,24,13,0.8));
    border-color:#3a5a2a; color:#88cc88;
}
.btn-disabled {
    background: rgba(10,10,10,0.5);
    border-color:#555; color:#aaa; cursor:default;
}

/* ---- Balance bar ---- */
.bal-bar {
    display:flex; justify-content:space-between;
    font-size:15px; color:#8a6a30; padding:2px 4px;
    flex-shrink:0;
    font-weight:bold;
    background: rgba(0,0,0,0.75);
    border:1px solid rgba(120,80,0,0.5);
    border-radius:6px;
    transform: translate(var(--bal-x), var(--bal-y));
}
.bal-bar span { color:var(--accent); }

/* ---- Result overlay â€” disabled ---- */
#resultOverlay { display:none !important; }

/* ---- Result line (replaces overlay) ---- */
#resultLine {
    position:absolute;
    display:none;
    top:50%; left:50%;
    transform: translate(calc(-50% + var(--result-x)), calc(-50% + var(--result-y))) scale(var(--result-scale));
    transform-origin:center;
    white-space:nowrap;
    text-align:center;
    font-size:var(--result-font);
    font-weight:bold;
    letter-spacing:1px;
    text-shadow:0 2px 6px rgba(0,0,0,0.95);
    z-index:30;
    pointer-events:none;
    background: rgba(0,0,0,0.82);
    border:1px solid rgba(255,215,0,0.4);
    border-radius:6px;
    padding:6px 18px;
    box-shadow: 0 0 12px rgba(0,0,0,0.7);
}

/* ---- Result buttons row ---- */
#resultBtns {
    position:absolute;
    display:none;
    top:50%; left:50%;
    transform: translate(calc(-50% + var(--pa-x)), calc(-50% + var(--pa-y))) scale(var(--pa-scale));
    transform-origin:center;
    z-index:31;
    display:none;
    flex-direction:row;
    align-items:center;
    gap:var(--pa-gap);
}
#playAgainBtn, #rebetBtn {
    padding:8px 22px;
    border-radius:6px;
    cursor:pointer;
    font-family:Georgia,serif;
    font-size:var(--pa-font);
    font-weight:bold;
    letter-spacing:2px;
    transition:all 0.15s;
    white-space:nowrap;
}
#playAgainBtn {
    background: rgba(20,36,10,0.92);
    border:2px solid #3a6a1a;
    color:#7dcc55;
}
#playAgainBtn:hover { border-color:#7dcc55; box-shadow:0 0 14px rgba(100,220,60,0.4); }
#rebetBtn {
    background: rgba(36,26,8,0.92);
    border:2px solid #8a5a10;
    color:#e8a030;
}
#rebetBtn:hover { border-color:#e8a030; box-shadow:0 0 14px rgba(232,160,48,0.4); }

/* ---- Debug panel ---- */
#debugPanel {
    position:absolute; top:0; right:0; width:200px; height:100%;
    overflow-y:auto; background:rgba(0,0,0,0.92);
    border-left:1px solid #333; padding:10px 8px;
    box-sizing:border-box; z-index:9999;
    font-size:11px; color:#ccc; display:none;
}
</style>
</head>
<body>




<div class="page-center">
<div class="game-wrap" id="gameWrap">

    <!-- Grid -->
    <div class="grid-wrap" id="gridWrap"></div>

    <!-- Chips + bet row â€” absolutely positioned, independent of controls -->
    <div id="chipBetRow">
        <div class="chip-row" id="chipRow">
            <button class="chip-btn selected" onclick="selectChip(100,'c100')" id="c100">
                <img src="https://drive.google.com/thumbnail?id=1hx7VaQG7UFHtdOE_uGJ64cOuedd81n-x&sz=w120" alt="100">
            </button>
            <button class="chip-btn" onclick="selectChip(500,'c500')" id="c500">
                <img src="https://drive.google.com/thumbnail?id=1IJ7Lp03TQ7rJjetXNoUGq9TB5b8sJmTs&sz=w120" alt="500">
            </button>
            <button class="chip-btn" onclick="selectChip(1000,'c1k')" id="c1k">
                <img src="https://drive.google.com/thumbnail?id=1gN38szt9JExdAZrVipnRKahg9zLwGtOq&sz=w120" alt="1K">
            </button>
            <button class="chip-btn" onclick="selectChip(5000,'c5k')" id="c5k">
                <img src="https://drive.google.com/thumbnail?id=11cxGHjfNZFIJgTXnQGmFDSFK-1fUhVup&sz=w120" alt="5K">
            </button>
            <button class="chip-btn" onclick="selectChip(10000,'c10k')" id="c10k">
                <img src="https://drive.google.com/thumbnail?id=10SkRQCPz-BckF4jBUS0noiSmThGsyx47&sz=w120" alt="10K">
            </button>
        </div>
        <div class="bet-row">
            <div class="bet-disp" id="betDisp">0 Gold</div>
        </div>
    </div>

    <!-- Controls area (moveable as a unit) -->
    <div id="controlsArea">
        <!-- Multiplier banner -->
        <div class="mult-banner">
            <div class="mult-val" id="multVal">-</div>
            <div class="mult-label" id="multLabel">NEXT MULTIPLIER</div>
        </div>

        <!-- Action buttons -->
        <div class="action-row" id="actionRow"></div>

        <!-- Balance bar -->
        <div class="bal-bar">
            <div>BALANCE: <span id="balDisp">100,000g</span></div>
            <div id="winDisp"></div>
        </div>
    </div>

    <!-- Choose Your Seal (shown on play start) -->
    <div id="chooseDisp">CHOOSE YOUR SEAL</div>

    <!-- Cash-out display (shown during play) -->

        <div class="co-val" id="cashoutVal"></div>
        <div class="co-label">CASH OUT</div>
    </div>

    <!-- Mode image buttons (individually positioned) -->
    <img src="https://drive.google.com/thumbnail?id=1_uGdg2pJD-77yIwisqw9UQQsrEYOvgFL&sz=w300"
         class="mode-img-btn active" id="mib-easy" onclick="setMode('easy')" alt="Easy">
    <img src="https://drive.google.com/thumbnail?id=1mTKLFJYxtEaa8GMLGj797DvIm3CtHJIJ&sz=w300"
         class="mode-img-btn" id="mib-medium" onclick="setMode('medium')" alt="Medium">
    <img src="https://drive.google.com/thumbnail?id=1NQU-5ojQBiVUNp33i-shlDJry-s37a-U&sz=w300"
         class="mode-img-btn" id="mib-hard" onclick="setMode('hard')" alt="Hard">

    <!-- Result overlay (disabled) -->
    <div id="resultOverlay"><div id="resultBox"></div></div>

    <!-- Result line -->
    <div id="resultLine"></div>

    <!-- Result buttons -->
    <div id="resultBtns">
        <button id="rebetBtn" onclick="rebet()">REBET</button>
        <button id="playAgainBtn" onclick="newRound()">PLAY AGAIN</button>
    </div>
</div>
</div>

<!-- Debug panel -->
<div id="debugPanel" style="position:fixed;top:0;right:0;width:235px;height:100vh;overflow-y:auto;background:rgba(0,0,0,0.95);border-left:1px solid #555;padding:10px;z-index:9999;color:#ccc;display:none;box-sizing:border-box;">

    <div style="color:#ffd700;font-weight:bold;border-bottom:1px solid #444;padding-bottom:4px;margin-bottom:8px;font-size:12px;">ROW OFFSETS â€” D to close</div>

    <div class="ds"><div class="dl"><span>Row 9 (top)</span><span id="dv-r9" class="dv">11px</span></div>
        <input type="range" min="-80" max="150" step="1" value="11" oninput="dbRow(9,this,'dv-r9')"></div>
    <div class="ds"><div class="dl"><span>Row 8</span><span id="dv-r8" class="dv">12px</span></div>
        <input type="range" min="-80" max="150" step="1" value="12" oninput="dbRow(8,this,'dv-r8')"></div>
    <div class="ds"><div class="dl"><span>Row 7</span><span id="dv-r7" class="dv">14px</span></div>
        <input type="range" min="-80" max="150" step="1" value="14" oninput="dbRow(7,this,'dv-r7')"></div>

// Audio unlock — browsers require user gesture before play()
let _audioReady = false;
function _unlockAudio() {
    if (_audioReady) return; _audioReady = true;
    [SFX_WIN, SFX_TRAP].forEach(s => {
        s.muted = true;
        const p = s.play();
        if (p) p.then(() => { s.pause(); s.muted = false; s.currentTime = 0; }).catch(() => {});
    });
}
['click','keydown','touchstart'].forEach(ev => document.addEventListener(ev, _unlockAudio, {once: true}));
function playSound(sfx){ try{ sfx.currentTime=0; sfx.play().catch(()=>{}); }catch(e){} }
function cellImg(src){
    const s = getComputedStyle(document.documentElement);
    const sz  = s.getPropertyValue('--img-size').trim() || '88%';
    const ox  = s.getPropertyValue('--cell-img-offset-x').trim() || '0px';
    const oy  = s.getPropertyValue('--cell-img-offset-y').trim() || '0px';
    return `<img src="${src}" style="width:${sz};height:${sz};object-fit:contain;pointer-events:none;position:relative;left:${ox};top:${oy};">`;
}

// ---- STATE ----
let balance = 100000;
let G = freshGame();
let selectedChip = 100;
let currentMode = 'easy';
let lastBet = 0;
let lastMode = 'easy';
let debugVisible = false;
// Per-row Y offsets (rows 1-9, index 0 = row 1)
let rowOffsets = [13,11,9,7,8,11,14,12,11]; // row1-9
let colOffsets = [14,6,-5]; // col1-3 (X offset per column)

function freshGame(){
    return { phase: PHASES.BET, bet: 0, row: 0, traps: [], won: 0 };
}

// ---- MATH ----
function perRowMult(mode){
    const m = MODES[mode];
    return (m.cols / m.safe) * (1 - HOUSE_EDGE);
}
function multAtRow(mode, row){
    return Math.pow(perRowMult(mode), row);
}
function fmt(n){ return n.toLocaleString()+'g'; }
function fmtMult(x){
    if(x >= 1000) return x.toFixed(0)+'x';
    if(x >= 10)   return x.toFixed(1)+'x';
    return x.toFixed(2)+'x';
}

// ---- TRAPS ----
// traps[r] = array of trap column indices for row r
function generateTraps(mode){
    const m = MODES[mode];
    const numTraps = m.cols - m.safe;
    const traps = [null];
    for(let r=1; r<=ROWS; r++){
        const cols = Array.from({length: m.cols}, (_, i) => i);
        // Fisher-Yates shuffle, take first numTraps
        for(let i = cols.length-1; i > 0; i--){
            const j = Math.floor(Math.random() * (i+1));
            [cols[i], cols[j]] = [cols[j], cols[i]];
        }
        traps.push(cols.slice(0, numTraps));
    }
    return traps;
}

// ---- CHIP / BET ----
function selectChip(val, id){
    selectedChip = val;
    document.querySelectorAll('.chip-btn').forEach(b => b.classList.remove('selected'));
    const el = document.getElementById(id);
    if(el) el.classList.add('selected');
    if(G.phase === PHASES.BET){
        G.bet += val;
        if(G.bet > balance) G.bet = balance;
        renderBetDisp();
        renderActions();
    }
}

function halveBet(){
    if(G.phase !== PHASES.BET) return;
    G.bet = Math.floor(G.bet / 2);
    renderBetDisp(); renderActions();
}
function doubleBet(){
    if(G.phase !== PHASES.BET) return;
    G.bet = Math.min(G.bet * 2, balance);
    if(G.bet === 0) G.bet = Math.min(selectedChip, balance);
    renderBetDisp(); renderActions();
}
function clearBet(){
    if(G.phase !== PHASES.BET) return;
    G.bet = 0;
    renderBetDisp(); renderActions();
}
function rebetAndPlay(){
    if(G.phase !== PHASES.BET || !lastBet || lastBet > balance) return;
    setMode(lastMode);
    G.bet = lastBet;
    renderBetDisp();
    startPlay();
}

// ---- MODE ----
function setMode(mode){
    if(G.phase !== PHASES.BET) return;
    currentMode = mode;
    ['easy','medium','hard'].forEach(m => {
        const el = document.getElementById('mib-' + m);
        if(el) el.classList.toggle('active', m === mode);
    });
    renderGrid();
    renderMultBanner();
}

// ---- PLAY ----
function startPlay(){
    if(G.phase !== PHASES.BET) return;
    if(G.bet <= 0){ G.bet = Math.min(selectedChip, balance); renderBetDisp(); }
    if(G.bet <= 0 || G.bet > balance) return;

    balance -= G.bet;
    G.traps = generateTraps(currentMode);
    G.row = 1;
    G.phase = PHASES.PLAY;

    document.getElementById('chipBetRow').style.visibility = 'hidden';
    document.querySelectorAll('.mode-img-btn').forEach(b => b.style.visibility = 'hidden');
    document.getElementById('chooseDisp').style.display = 'block';

    renderGrid();
    renderMultBanner();
    renderBalDisp();
    renderActions();
    renderWinDisp();
}

function clickCell(row, col){
    if(G.phase !== PHASES.PLAY || row !== G.row) return;
    const trapCols = G.traps[row]; // array of trap indices
    const isTrapped = trapCols.includes(col);

    const rowEl = document.getElementById(`row-${row}`);
    if(rowEl){
        const cells = rowEl.querySelectorAll('.cell');
        cells.forEach((c, i) => {
            if(i === col){
                c.classList.add(isTrapped ? 'chosen-trap' : 'chosen-safe');
                c.innerHTML = cellImg(isTrapped ? IMG_TRAP : IMG_SAFE);
            } else if(isTrapped){
                const isTrap = trapCols.includes(i);
                c.classList.add(isTrap ? 'trap' : 'safe');
                c.innerHTML = cellImg(isTrap ? IMG_TRAP : IMG_SAFE);
            }
        });
    }

    if(isTrapped){
        playSound(SFX_TRAP);
        document.getElementById('chooseDisp').style.display = 'none';
        setTimeout(() => revealAllTraps(row), 300);
        G.phase = PHASES.RESULT;
        G.won = 0;
        renderActions(); // clear cashout button immediately on bust
        setTimeout(() => showResult(false, row-1), 700);
        setTimeout(() => { debugVisible = true; document.getElementById('debugPanel').style.display = 'block'; }, 800);
        updateRowStates();
    } else {
        playSound(SFX_WIN);
        G.row++;
        if(G.row > ROWS){
            G.won = Math.round(G.bet * multAtRow(currentMode, ROWS));
            balance += G.won;
            G.phase = PHASES.RESULT;
            document.getElementById('chooseDisp').style.display = 'none';
            renderBalDisp();
            updateRowStates();
            setTimeout(() => showResult(true, ROWS), 300);
        } else {
            updateRowStates();
            renderMultBanner();
            renderWinDisp();
            renderActions();
        }
    }
}

function revealAllTraps(clearedUpTo){
    for(let r = clearedUpTo+1; r <= ROWS; r++){
        const rowEl = document.getElementById(`row-${r}`);
        if(!rowEl) continue;
        const trapCols = G.traps[r];
        const cells = rowEl.querySelectorAll('.cell');
        cells.forEach((c, i) => {
            if(trapCols.includes(i)){
                c.classList.add('trap-revealed');
                c.innerHTML = cellImg(IMG_TRAP);
            }
        });
    }
}

function cashOut(){
    if(G.phase !== PHASES.PLAY || G.row <= 1) return;
    document.getElementById('chooseDisp').style.display = 'none';
    const clearedRows = G.row - 1;
    G.won = Math.round(G.bet * multAtRow(currentMode, clearedRows));
    balance += G.won;
    G.phase = PHASES.RESULT;
    renderBalDisp();
    revealAllTraps(clearedRows);
    showResult(true, clearedRows);
}

// ---- RESULT ----
function showResult(win, rows){
    const line = document.getElementById('resultLine');
    const paBtn = document.getElementById('resultBtns');
    if(win){
        const isFullClear = rows === ROWS;
        const label = isFullClear ? 'đźŹ† PERFECT CLEAR' : 'âś“ CASHED OUT';
        line.style.color = 'var(--safe-color)';
        line.innerHTML = `${label} &nbsp;Â·&nbsp; <span style="color:var(--accent)">+${fmt(G.won)}</span> &nbsp;Â·&nbsp; Cleared ${rows} row${rows!==1?'s':''}`;
    } else {
        line.style.color = 'var(--trap-color)';
        line.innerHTML = `đź’€ BUSTED &nbsp;Â·&nbsp; <span style="color:#ff4a4a">-${fmt(G.bet)}</span> &nbsp;Â·&nbsp; Survived ${rows} row${rows!==1?'s':''}`;
    }
    line.style.display = 'block';
    paBtn.style.display = 'flex';
}

function rebet(){
    const savedBet = G.bet;
    const savedMode = currentMode;
    newRound();
    // Restore mode (newRound already set currentMode = lastMode, just make sure)
    currentMode = savedMode;
    ['easy','medium','hard'].forEach(m => {
        const el = document.getElementById('mib-' + m);
        if(el) el.classList.toggle('active', m === savedMode);
    });
    // Restore bet and launch immediately
    if(savedBet > 0 && savedBet <= balance){
        G.bet = savedBet;
        renderBetDisp();
        startPlay();
    }
}

function newRound(){
    debugVisible = false;
    document.getElementById('debugPanel').style.display = 'none';
    document.getElementById('resultLine').style.display = 'none';
    document.getElementById('resultBtns').style.display = 'none';
    lastBet = G.bet;
    lastMode = currentMode;
    G = freshGame();
    document.getElementById('chipBetRow').style.visibility = '';
    document.querySelectorAll('.mode-img-btn').forEach(b => b.style.visibility = '');
    document.getElementById('chooseDisp').style.display = 'none';
    renderGrid(); renderMultBanner(); renderBalDisp();
    renderBetDisp(); renderActions(); renderWinDisp();
}

// ---- RENDER ----

// Updates row CSS states + cell clickability WITHOUT wiping cell contents
function updateRowStates(){
    const m = MODES[currentMode];
    // Update grid header
    const header = document.querySelector('.grid-header');
    if(header){
        let headerHtml = '';
        if(G.phase === PHASES.PLAY && G.row > 1){
            const cashAmt = Math.round(G.bet * multAtRow(currentMode, G.row-1));
            headerHtml = `<span class="grid-header-val">${fmt(cashAmt)}</span><span class="grid-header-label">CASH OUT</span>`;
        } else if(G.phase === PHASES.PLAY){
            const winAmt = Math.round(G.bet * multAtRow(currentMode, 1));
            headerHtml = `<span class="grid-header-val">${fmt(winAmt)}</span><span class="grid-header-label">WIN ROW 1</span>`;
        }
        header.innerHTML = headerHtml;
    }
    for(let r = 1; r <= ROWS; r++){
        const rowEl = document.getElementById(`row-${r}`);
        if(!rowEl) continue;
        let state = 'future';
        if(G.phase === PHASES.BET) state = 'future';
        else if(r < G.row)  state = 'cleared';
        else if(r === G.row) state = 'active';
        else state = 'future';
        if(G.phase === PHASES.RESULT) state = 'dead';
        rowEl.className = `grid-row state-${state}`;
        rowEl.style.transform = `translateY(${rowOffsets[r-1]}px)`;
        // Update cell clickability only â€” don't touch innerHTML
        rowEl.querySelectorAll('.cell').forEach((c, i) => {
            if(state === 'active'){
                c.onclick = () => clickCell(r, i);
            } else {
                c.onclick = null;
            }
        });
    }
}

function renderGrid(){
    const m = MODES[currentMode];
    const wrap = document.getElementById('gridWrap');
    let html = '';

    // Header bar â€” shows win amount during play, blank otherwise
    let headerHtml = '';
    if(G.phase === PHASES.PLAY && G.row > 1){
        const cashAmt = Math.round(G.bet * multAtRow(currentMode, G.row-1));
        headerHtml = `<span class="grid-header-val">${fmt(cashAmt)}</span><span class="grid-header-label">CASH OUT</span>`;
    } else if(G.phase === PHASES.PLAY){
        const winAmt = Math.round(G.bet * multAtRow(currentMode, 1));
        headerHtml = `<span class="grid-header-val">${fmt(winAmt)}</span><span class="grid-header-label">WIN ROW 1</span>`;
    }
    html += `<div class="grid-header">${headerHtml}</div>`;

    for(let r = ROWS; r >= 1; r--){
        let state = 'future';
        if(G.phase === PHASES.BET) state = 'future';
        else if(r < G.row)  state = 'cleared';
        else if(r === G.row) state = 'active';
        else state = 'future';
        if(G.phase === PHASES.RESULT) state = 'dead';

        const mult = multAtRow(currentMode, r);
        let cells = '';
        for(let c = 0; c < m.cols; c++){
            const clickable = (state === 'active');
            const cx = colOffsets[c] || 0;
            cells += `<div class="cell" id="cell-${r}-${c}" style="transform:translateX(${cx}px)" ${clickable ? `onclick="clickCell(${r},${c})"` : ''}>${cellImg(IMG_SEAL)}</div>`;
        }
        html += `<div class="grid-row state-${state}" id="row-${r}" style="transform:translateY(${rowOffsets[r-1]}px)">
            <div class="row-label">${r}</div>
            <div class="cells">${cells}</div>
            <div class="row-multi">${fmtMult(mult)}</div>
        </div>`;
    }
    wrap.innerHTML = html;
}

function renderMultBanner(){
    const el = document.getElementById('multVal');
    const label = document.getElementById('multLabel');
    const coDisp = document.getElementById('cashoutDisp');
    const coVal  = document.getElementById('cashoutVal');
    if(G.phase === PHASES.BET){
        el.textContent = fmtMult(multAtRow(currentMode, 1));
        label.textContent = '';
        coDisp.style.display = 'none';
    } else if(G.phase === PHASES.PLAY){
        el.textContent = fmtMult(multAtRow(currentMode, G.row));
        label.textContent = '';
        if(G.row > 1){
            const cashAmt = Math.round(G.bet * multAtRow(currentMode, G.row-1));
            coVal.textContent = fmt(cashAmt);
            coDisp.style.display = 'block';
        } else {
            coDisp.style.display = 'none';
        }
    } else {
        el.textContent = '-';
        label.textContent = '';
        coDisp.style.display = 'none';
    }
}

function renderActions(){
    const el = document.getElementById('actionRow');
    if(G.phase === PHASES.BET){
        let html = '';
        if(lastBet && lastBet <= balance){
            // REBET & PLAY button removed â€” handled by result screen buttons
        }
        if(G.bet > 0){
            html += `<button class="btn btn-play" onclick="startPlay()">PLAY</button>`;
            html += `<button class="btn btn-clear" onclick="clearBet()">CLEAR</button>`;
        } else if(!lastBet){
            html += `<button class="btn btn-disabled">SELECT CHIP TO BET</button>`;
        }
        el.innerHTML = html;
    } else if(G.phase === PHASES.PLAY){
        const clearedRows = G.row - 1;
        if(clearedRows > 0){
            const cashAmt = Math.round(G.bet * multAtRow(currentMode, clearedRows));
            el.innerHTML = `<button class="btn btn-cashout" onclick="cashOut()">CASH OUT ${fmt(cashAmt)}</button>`;
        } else {
            el.innerHTML = `<button class="btn btn-disabled">CLICK A PANEL TO START</button>`;
        }
    } else {
        el.innerHTML = '';
    }
}

function renderBetDisp(){ document.getElementById('betDisp').textContent = fmt(G.bet); }
function renderBalDisp(){ document.getElementById('balDisp').textContent = balance.toLocaleString()+'g'; }
function renderWinDisp(){
    const el = document.getElementById('winDisp');
    if(G.phase === PHASES.PLAY && G.row > 1){
        const cur = Math.round(G.bet * multAtRow(currentMode, G.row-1));
        el.innerHTML = `LOCKED IN: <span>${fmt(cur)}</span>`;
    } else {
        el.innerHTML = '';
    }
}

// ---- DEBUG ----
function dbNum(cssVar, input, labelId){
    const val = parseFloat(input.value).toFixed(2).replace(/\.?0+$/,'');
    document.getElementById(labelId).textContent = val;
    document.documentElement.style.setProperty(cssVar, val);
}

function db(cssVar, unit, input, labelId){
    const val = input.value;
    document.getElementById(labelId).textContent = val + unit;
    document.documentElement.style.setProperty(cssVar, val + unit);
    // Live-update cell image sizing/offset
    const cs = getComputedStyle(document.documentElement);
    const sz = cs.getPropertyValue('--img-size').trim();
    const ox = cs.getPropertyValue('--cell-img-offset-x').trim();
    const oy = cs.getPropertyValue('--cell-img-offset-y').trim();
    document.querySelectorAll('.cell img').forEach(img => {
        img.style.width  = sz;
        img.style.height = sz;
        img.style.left   = ox;
        img.style.top    = oy;
    });
}

function dbRow(rowNum, input, labelId){
    const val = parseInt(input.value);
    document.getElementById(labelId).textContent = val + 'px';
    rowOffsets[rowNum - 1] = val;
    const rowEl = document.getElementById(`row-${rowNum}`);
    if(rowEl) rowEl.style.transform = `translateY(${val}px)`;
}

function dbCol(colIdx, input, labelId){
    const val = parseInt(input.value);
    document.getElementById(labelId).textContent = val + 'px';
    colOffsets[colIdx] = val;
    // Update all cells in this column live
    for(let r = 1; r <= ROWS; r++){
        const cell = document.getElementById(`cell-${r}-${colIdx}`);
        if(cell) cell.style.transform = `translateX(${val}px)`;
    }
}

function copyDebugValues(){
    const out = rowOffsets.map((v,i) => `row${i+1}=${v}`).join(', ');
    document.getElementById('copyOut').value = out;
    try{ navigator.clipboard.writeText(out); }catch(e){}
}

document.addEventListener('keydown', e => {
    if(e.key === 'd' || e.key === 'D'){
        debugVisible = !debugVisible;
        document.getElementById('debugPanel').style.display = debugVisible ? 'block' : 'none';
    }
});

// ---- INIT ----
renderGrid();
renderMultBanner();
renderBalDisp();
renderBetDisp();
renderActions();
</script>
